name: backfill-db

on:
  workflow_dispatch:
    inputs:
      tables:
        description: "채울 테이블 (콤마 구분, 예: daily_fundamental 또는 daily_prices,daily_short)"
        required: false
        default: "daily_prices,daily_investor_flow,daily_short,daily_fundamental"
      start_date:
        description: "시작일 (YYYY-MM-DD)"
        required: false
        default: "2022-01-01"
      end_date:
        description: "종료일 (YYYY-MM-DD, 비우면 오늘)"
        required: false
        default: ""
      max_runtime_min:
        description: "이번 실행 최대 시간(분) — KRX 세션 1시간 만료 감안, 기본 50분"
        required: false
        default: "50"

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run backfill
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          END="${{ inputs.end_date }}"
          if [ -z "$END" ]; then END=$(date +%Y-%m-%d); fi
          python backfill.py --tables "${{ inputs.tables }}" --start "${{ inputs.start_date }}" \
            --end "$END" --max-runtime-min "${{ inputs.max_runtime_min }}"
      - name: Commit DB progress
        run: |
          git config user.name "screener-bot"
          git config user.email "bot@users.noreply.github.com"
          git lfs install --local
          git add data/
          git commit -m "chore: backfill progress" || echo "no changes"
          git push
