name: daily-screener

on:
  schedule:
    - cron: "0 7 * * 1-5"  # UTC 07:00 = KST 16:00(장마감 15:30 직후), 평일만
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run screener
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: python screener.py
      - name: Update market data DB
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: python update_db_daily.py
      - name: Publish results to docs/
        run: cp results.json docs/results.json
      - name: Commit results
        run: |
          git config user.name "screener-bot"
          git config user.email "bot@users.noreply.github.com"
          git lfs install --local
          git add results.json docs/results.json data/
          git commit -m "chore: update results" || echo "no changes"
          git push
