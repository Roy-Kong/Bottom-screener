name: daily-screener

on:
  schedule:
    - cron: "0 11 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run screener
        run: python screener.py
      - name: Publish results to docs/
        run: cp results.json docs/results.json
      - name: Commit results
        run: |
          git config user.name "screener-bot"
          git config user.email "bot@users.noreply.github.com"
          git add results.json docs/results.json
          git commit -m "chore: update results" || echo "no changes"
          git push
