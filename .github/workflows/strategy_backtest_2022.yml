name: strategy-backtest-2022

on:
  workflow_dispatch:
    inputs:
      months:
        description: "콤마구분 YYYY-MM 목록 (예: 2022-01 또는 2022-01,2022-02,...,2022-12)"
        required: false
        default: "2022-01"
      out_csv:
        description: "결과 CSV 저장 경로"
        required: false
        default: "backtests/backtest_2022_test.csv"
      max_runtime_min:
        description: "이번 실행 최대 시간(분) — KRX 세션 1시간 만료 감안, 기본 50분"
        required: false
        default: "50"

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Pull needed DB files (LFS)
        run: |
          git lfs install --local
          python - <<'PYEOF'
          import datetime as dt
          import db_reader as dbr

          months = "${{ inputs.months }}".split(",")
          dates = set()
          for ym in months:
              ym = ym.strip()
              if not ym:
                  continue
              year, month = int(ym[:4]), int(ym[5:7])
              anchor = dt.date(year, month, 1)
              # OHLCV 130일 + 펀더멘털 60개월 + 공매도 13주 전부 포함(strategy_backtest_2022.py가
              # DB_COVERAGE_START 이후 anchor는 OHLCV/공매도/매집도 DB 우선으로 읽으므로,
              # 펀더멘털 월말 표본만 받던 예전 범위로는 부족하다).
              dates.update(dbr.needed_dates_for_backtest(anchor))
          paths = ",".join(f"data/{d}.db" for d in sorted(dates))
          with open("_lfs_includes.txt", "w") as f:
              f.write(paths)
          PYEOF
          INCLUDES=$(cat _lfs_includes.txt)
          rm -f _lfs_includes.txt
          if [ -n "$INCLUDES" ]; then
            git lfs pull --include="$INCLUDES" || true
            git lfs pull --include="$INCLUDES"
          fi
      - name: Run strategy backtest
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          python strategy_backtest_2022.py --months "${{ inputs.months }}" \
            --out "${{ inputs.out_csv }}" --max-runtime-min "${{ inputs.max_runtime_min }}"
      - name: Commit backtest result
        run: |
          git config user.name "screener-bot"
          git config user.email "bot@users.noreply.github.com"
          git lfs install --local
          git add backtests/
          git commit -m "chore: strategy backtest 2022 result (${{ inputs.months }})" || echo "no changes"
          git push
