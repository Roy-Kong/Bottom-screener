<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#061018">
<title>바닥 스크리너 · Korea Bottom Screener</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --abyss:#061018;--deep:#0B1A28;--deep2:#102639;--line:#1C3A52;
    --ink:#EAF2F8;--mute:#6E8CA6;--dim:#436079;
    --go:#2FE0B6;--mid:#F4C15D;--hot:#F5695C;--ping:#4CC9E8;
    --disp:'Space Grotesk',sans-serif;--mono:'IBM Plex Mono',ui-monospace,monospace;--body:'IBM Plex Sans',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--abyss);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased}
  body{min-height:100dvh;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    background:radial-gradient(120% 55% at 50% -10%,#0d2438 0%,rgba(13,36,56,0) 55%),var(--abyss)}
  .wrap{max-width:820px;margin:0 auto;padding:22px 16px 60px}

  .top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:6px}
  h1{font-family:var(--disp);font-weight:700;font-size:23px;letter-spacing:-.4px;display:flex;align-items:center;gap:9px}
  .wave{width:23px;height:23px;flex:none}
  .meta{font-family:var(--mono);font-size:11.5px;color:var(--dim);text-align:right;line-height:1.5}
  .sub{color:var(--mute);font-size:12.5px;margin:8px 0 18px;line-height:1.5}

  .legend{display:flex;flex-wrap:wrap;gap:10px 16px;margin-bottom:16px;font-family:var(--mono);font-size:10.5px;color:var(--mute)}
  .legend .lg{display:flex;align-items:center;gap:5px}
  .ld{width:8px;height:8px;border-radius:50%}

  .row{background:var(--deep);border:1px solid var(--line);border-radius:13px;margin-bottom:9px;overflow:hidden}
  .row.confirmed{border-color:var(--go);box-shadow:0 0 0 1px var(--go) inset}
  .rhead{display:grid;grid-template-columns:34px 1fr auto auto;gap:12px;align-items:center;padding:13px 15px;cursor:pointer}
  .rank{font-family:var(--disp);font-weight:700;font-size:17px;color:var(--mute);text-align:center}
  .nm{font-family:var(--disp);font-weight:500;font-size:16px}
  .tk{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:2px}
  .badge{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--abyss);
    background:var(--go);border-radius:5px;padding:2px 6px;margin-top:3px;letter-spacing:.2px}
  .dots{display:flex;gap:4px}
  .d{width:9px;height:9px;border-radius:50%}
  .sc{font-family:var(--disp);font-weight:700;font-size:20px;min-width:44px;text-align:right}
  .rbody{display:none;padding:0 15px 14px;border-top:1px dashed var(--line)}
  .row.open .rbody{display:block}
  .grp-head{font-family:var(--mono);font-size:11px;color:var(--mute);letter-spacing:.3px;
    margin:20px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between}
  .grp-head:first-child{margin-top:0}
  .grp-head .go{color:var(--go)}
  .subhead{font-family:var(--mono);font-size:10.5px;color:var(--dim);letter-spacing:.3px;
    margin-top:14px;padding-top:10px;border-top:1px solid var(--line);display:flex;justify-content:space-between}
  .subhead:first-of-type{border-top:none;padding-top:0;margin-top:11px}
  .subhead .ssc{color:var(--ink);font-weight:600}
  .why{margin-top:11px}
  .why-title{font-family:var(--mono);font-size:10.5px;color:var(--dim);letter-spacing:.3px;margin-bottom:6px}
  .why-summary{background:rgba(47,224,182,.10);border:1px solid var(--go);border-radius:9px;
    padding:9px 11px;font-size:12.5px;line-height:1.55;color:var(--ink);margin-bottom:8px}
  .why-p{font-size:12.5px;line-height:1.6;color:var(--mute);margin-top:6px}
  .why-p b{color:var(--ink);font-weight:600;font-style:normal}
  .bar{display:grid;grid-template-columns:120px 1fr 40px;gap:10px;align-items:center;margin-top:11px;font-family:var(--mono);font-size:12px}
  .bar .bl{color:var(--mute)}
  .track{height:7px;background:var(--abyss);border-radius:4px;overflow:hidden}
  .fill{height:100%;border-radius:4px}
  .bv{text-align:right;color:var(--ink)}
  .na{color:var(--dim);font-style:italic}
  .close{font-family:var(--mono);font-size:11px;color:var(--mute);margin-top:12px}

  .loading,.err{font-family:var(--mono);font-size:13px;color:var(--mute);padding:30px 4px;text-align:center;line-height:1.6}
  .err{color:var(--hot)}
  .disc{margin-top:22px;font-size:11px;color:var(--dim);line-height:1.55;font-family:var(--mono)}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>
      <svg class="wave" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M2 12c2.5 0 2.5-5 5-5s2.5 5 5 5 2.5-5 5-5 2.5 5 5 5" stroke="#4CC9E8" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M2 17c2.5 0 2.5-3 5-3s2.5 3 5 3 2.5-3 5-3 2.5 3 5 3" stroke="#2FE0B6" stroke-width="1.6" stroke-linecap="round" opacity=".6"/>
      </svg>
      바닥 스크리너
    </h1>
    <div class="meta" id="meta"></div>
  </div>
  <div class="sub">코스피·코스닥 전종목을 바닥 신호 7개로 채점(60점 이상만 통과)한 뒤, 턴어라운드 신호 5개로
    실제로 방향을 틀었는지 확인합니다. 종목을 탭하면 두 그룹의 신호별 점수가 각각 열립니다.</div>

  <div class="legend">
    <span class="lg"><span class="ld" style="background:var(--go)"></span>신호 강함(≥66)</span>
    <span class="lg"><span class="ld" style="background:var(--mid)"></span>중간(34–65)</span>
    <span class="lg"><span class="ld" style="background:var(--hot)"></span>약함(&lt;34)</span>
    <span class="lg"><span class="ld" style="background:#2b4359"></span>미적용</span>
  </div>

  <div id="list"><div class="loading">데이터 불러오는 중…</div></div>

  <div class="disc" id="disc"></div>
</div>

<script>
const LABELS = {
  volume_dryness:"거래량 고갈", accumulation:"기관·외국인 매집", short_covering:"공매도 감소",
  pbr_low:"PBR 역사적 저점", dividend_yield:"배당수익률", relative_strength:"상대강도",
  volatility_squeeze:"변동성 수축"
};
const ORDER = ["volume_dryness","accumulation","short_covering","pbr_low","dividend_yield","relative_strength","volatility_squeeze"];

const TURNAROUND_LABELS = {
  volume_surge:"거래량 동반 상승", ma_breakout:"이평선 돌파", short_term_breakout:"단기 고점 돌파",
  relative_strength_accel:"상대강도 가속", accumulation_accel:"매집 가속"
};
const TURNAROUND_ORDER = ["volume_surge","ma_breakout","short_term_breakout","relative_strength_accel","accumulation_accel"];

// 미리보기용 샘플 (호스팅되면 실제 results.json로 대체됨)
const SAMPLE = {
  generated_at:"(미리보기)", as_of_date:"—", universe_size:2600, scored:0,
  results:[
    {ticker:"000660",name:"예시종목 A",score:91.2,close:207000,status:"confirmed_turnaround",
      breakdown:{volume_dryness:88,accumulation:100,short_covering:95,pbr_low:92,dividend_yield:80,relative_strength:92,volatility_squeeze:70},
      turnaround_score:74.0,
      turnaround_breakdown:{volume_surge:82,ma_breakout:90,short_term_breakout:65,relative_strength_accel:71,accumulation_accel:62},
      explanation:{
        summary:"바닥 신호(기관·외국인 매집, 공매도 감소)와 턴어라운드 신호(이평선 돌파, 거래량 동반 상승)가 동시에 확인됐습니다.",
        bottom:"최근 20일간 기관·외국인이 250억원(유통시총의 2.1%)을 순매수했고, 그동안 주가는 +2.8%로 조용했습니다. PBR이 0.82배로 최근 5년 밴드 하위 8% 구간입니다.",
        turnaround:"20일 이평선이 60일 이평선보다 +3.0% 위로 정배열이고, 종가는 60일 이평선을 +5.0% 돌파했습니다. 최근 5일 거래량이 20일 평균 대비 220%로 늘었습니다."
      }},
    {ticker:"005930",name:"예시종목 B",score:78.5,close:71000,status:"watching",
      breakdown:{volume_dryness:70,accumulation:85,short_covering:60,pbr_low:88,dividend_yield:null,relative_strength:89,volatility_squeeze:55},
      turnaround_score:22.0,
      turnaround_breakdown:{volume_surge:10,ma_breakout:20,short_term_breakout:15,relative_strength_accel:30,accumulation_accel:35},
      explanation:{
        summary:null,
        bottom:"최근 60일 코스피는 +5.0%인데 이 종목은 +18.0%로 지수보다 +13.0%p 선방했습니다. PBR이 1.10배로 최근 5년 밴드 하위 12% 구간입니다.",
        turnaround:""
      }},
    {ticker:"012345",name:"예시종목 C",score:64.0,close:15300,status:"watching",
      breakdown:{volume_dryness:55,accumulation:40,short_covering:72,pbr_low:95,dividend_yield:60,relative_strength:62,volatility_squeeze:48},
      turnaround_score:null,
      turnaround_breakdown:null,
      explanation:{summary:null,bottom:"PBR이 0.65배로 최근 5년 밴드 하위 5% 구간입니다.",turnaround:""}},
  ]
};

function color(v){ if(v==null) return "#2b4359"; return v>=66?"#2FE0B6":v>=34?"#F4C15D":"#F5695C"; }

function signalBars(breakdown, order, labels){
  return order.map(k=>{
    const v = breakdown ? breakdown[k] : null;
    const val = v==null?'<span class="na">미적용</span>':Math.round(v);
    const w = v==null?0:v;
    return '<div class="bar"><span class="bl">'+labels[k]+'</span>'+
      '<span class="track"><span class="fill" style="width:'+w+'%;background:'+color(v)+'"></span></span>'+
      '<span class="bv">'+val+'</span></div>';
  }).join("");
}

function escapeHtml(s){
  return String(s).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
}

function whyBlock(r){
  const e = r.explanation;
  if(!e) return "";
  let html = '<div class="why"><div class="why-title">왜 이 종목이 뽑혔나</div>';
  if(e.summary) html += '<div class="why-summary">'+escapeHtml(e.summary)+'</div>';
  if(e.bottom) html += '<div class="why-p"><b>바닥 신호</b> · '+escapeHtml(e.bottom)+'</div>';
  if(e.turnaround) html += '<div class="why-p"><b>턴어라운드 신호</b> · '+escapeHtml(e.turnaround)+'</div>';
  html += '</div>';
  return html;
}

function renderRow(r, rank){
  const confirmed = r.status === "confirmed_turnaround";
  const dots = ORDER.map(k=>'<span class="d" style="background:'+color(r.breakdown[k])+'"></span>').join("");
  const badge = confirmed ? '<div class="badge">✓ 턴어라운드 확인</div>' : "";
  const bottomBars = signalBars(r.breakdown, ORDER, LABELS);
  const turnScore = r.turnaround_score;
  const turnaroundBars = r.turnaround_breakdown
    ? signalBars(r.turnaround_breakdown, TURNAROUND_ORDER, TURNAROUND_LABELS)
    : '<div class="na" style="margin-top:8px">턴어라운드 데이터 부족(상장 이력 부족 등)</div>';
  return '<div class="row'+(confirmed?' confirmed':'')+'" onclick="this.classList.toggle(\'open\')">'+
    '<div class="rhead"><div class="rank">'+rank+'</div>'+
    '<div><div class="nm">'+r.name+'</div><div class="tk">'+r.ticker+'</div>'+badge+'</div>'+
    '<div class="dots">'+dots+'</div>'+
    '<div class="sc" style="color:'+color(r.score)+'">'+r.score+'</div></div>'+
    '<div class="rbody">'+
      whyBlock(r)+
      '<div class="subhead">바닥 신호<span class="ssc">'+r.score+'</span></div>'+bottomBars+
      '<div class="subhead">턴어라운드 신호<span class="ssc">'+(turnScore==null?'—':turnScore)+'</span></div>'+turnaroundBars+
      '<div class="close">종가 '+(r.close?r.close.toLocaleString('ko-KR')+'원':'—')+'</div>'+
    '</div>'+
  '</div>';
}

function render(data){
  document.getElementById("meta").innerHTML =
    "기준일 "+data.as_of_date+"<br>갱신 "+data.generated_at+"<br>채점 "+(data.scored||0)+" / "+(data.universe_size||"—");
  const list = document.getElementById("list");
  if(!data.results || !data.results.length){ list.innerHTML='<div class="err">결과가 없습니다.</div>'; return; }

  const confirmed = data.results.filter(r=>r.status==="confirmed_turnaround");
  const watching = data.results.filter(r=>r.status!=="confirmed_turnaround");
  let rank = 0;
  let html = "";
  if(confirmed.length){
    html += '<div class="grp-head"><span class="go">✓ 턴어라운드 확인 · 바닥+방향전환 교집합</span><span>'+confirmed.length+'개</span></div>';
    html += confirmed.map(r=>renderRow(r, ++rank)).join("");
  }
  if(watching.length){
    html += '<div class="grp-head"><span>관찰 대상 · 바닥은 맞지만 아직 안 돔</span><span>'+watching.length+'개</span></div>';
    html += watching.map(r=>renderRow(r, ++rank)).join("");
  }
  list.innerHTML = html;
}

document.getElementById("disc").textContent =
  "신호 동일 가중 · 임계값은 백테스트 전 시작값 · 매수·매도 신호가 아닌 후보 발굴 도구입니다. 바닥 신호는 매도세 소진·저평가만, " +
  "턴어라운드 신호는 실제 방향 전환만 봅니다 — 두 점수는 섞이지 않습니다. 신용잔고·내부자매수는 무료로 종목별 조회할 API를 찾지 못해 제외했습니다.";

fetch("results.json").then(r=>{ if(!r.ok) throw new Error(); return r.json(); })
  .then(render)
  .catch(()=>{ render(SAMPLE); document.getElementById("meta").innerHTML+="<br><span style='color:var(--hot)'>※ 샘플(호스팅 전)</span>"; });
</script>
</body>
</html>
