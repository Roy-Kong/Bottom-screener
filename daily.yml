name: daily-screener

# 매일 한국시간 저녁 8시(장 마감·데이터 확정 후)에 실행
# UTC 11:00 = KST 20:00
on:
  schedule:
    - cron: "0 11 * * 1-5"   # 평일만
  workflow_dispatch:          # 수동 실행 버튼

permissions:
  contents: write             # 결과 커밋을 위해

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run screener
        run: python screener.py
      - name: Publish results to web/
        run: |
          cp results.json web/results.json
      - name: Commit results
        run: |
          git config user.name "screener-bot"
          git config user.email "bot@users.noreply.github.com"
          git add results.json web/results.json
          git commit -m "chore: update results $(date -u +%Y-%m-%d)" || echo "no changes"
          git push
